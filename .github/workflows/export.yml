name: Export

on:
  push:
    branches: ["claude/rogue-like-shooter-game-tCOTO", "main"]
  pull_request:
    branches: ["claude/rogue-like-shooter-game-tCOTO", "main"]

jobs:
  export:
    name: Export (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux, windows, macos]
    container:
      image: barichello/godot-ci:4.3

    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          mv /root/.local/share/godot/export_templates/4.3.stable/* \
             ~/.local/share/godot/export_templates/4.3.stable/

      - name: Export ${{ matrix.platform }}
        run: |
          mkdir -p dist/${{ matrix.platform }}
          godot --headless --export-release "${{ matrix.platform }}" "dist/${{ matrix.platform }}/sqares" 2>&1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqares-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}/
