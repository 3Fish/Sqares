# .github/workflows/notify-claude.yml
on:
  check_run:
    types: [completed]

jobs:
  notify:
    if: |
      startsWith(github.event.check_run.pull_requests[0].head.ref, 'claude/') &&
      github.event.check_run.conclusion != 'success'
    runs-on: ubuntu/latest
    steps:
      - name: Fire Claude CI-Fixer Routine
        run: |
          curl -X POST https://api.anthropic.com/v1/claude_code/routines/${{ secrets.CLAUDE_ROUTINE_ID }}/fire \
            -H "Authorization: Bearer ${{ secrets.CLAUDE_ROUTINE_TOKEN }}" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"CI check '${{ github.event.check_run.name }}' failed on branch ${{ github.event.check_run.pull_requests[0].head.ref }}. PR: ${{ github.event.check_run.pull_requests[0].url }}\"}"