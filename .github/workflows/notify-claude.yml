name: Notify Claude on CI Failure

on:
  workflow_run:
    workflows: ["Export"]
    types: [completed]

jobs:
  notify:
    if: |
      startsWith(github.event.workflow_run.head_branch, 'claude/') &&
      github.event.workflow_run.conclusion != 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Fire Claude CI-Fixer Routine
        run: |
          curl -X POST https://api.anthropic.com/v1/claude_code/routines/${{ secrets.CLAUDE_ROUTINE_ID }}/fire \
            -H "Authorization: Bearer ${{ secrets.CLAUDE_ROUTINE_TOKEN }}" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"CI workflow '${{ github.event.workflow_run.name }}' failed on branch ${{ github.event.workflow_run.head_branch }}. Run: ${{ github.event.workflow_run.html_url }}\"}"
